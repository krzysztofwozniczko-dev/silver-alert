name: 📊 Daily Silver & FX Alert

on:
  schedule:
    # Każdego dnia o 10:00 UTC = 11:00 czasu polskiego (lato) / 9:00 (zima)
    - cron: "0 7 * * 1-5"   # tylko dni robocze (pon-pt)
    # Jeśli chcesz 7 dni w tygodniu, zmień na: "0 7 * * *"
  workflow_dispatch:         # możliwość ręcznego uruchomienia z panelu GitHub

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Pobierz kod
        uses: actions/checkout@v4

      - name: 🐍 Ustaw Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: 🚀 Wyślij raport
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py
